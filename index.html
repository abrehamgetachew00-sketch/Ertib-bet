<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telebirr Manual Deposit Verification</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid #eaeaea; padding-bottom: 10px; margin-top: 0; color: #111; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], input[type="number"], input[type="file"] { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; }
        button:hover { background-color: #0056b3; }
        .tx-card { background: #fff; border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; border-radius: 6px; display: flex; flex-direction: column; gap: 10px; }
        .tx-details { font-size: 14px; }
        .screenshot-preview { width: 100%; max-height: 250px; object-fit: contain; background: #eee; border-radius: 4px; border: 1px dashed #bbb; }
        .btn-group { display: flex; gap: 10px; }
        .btn-approve { background-color: #28a745; }
        .btn-approve:hover { background-color: #218838; }
        .btn-reject { background-color: #dc3545; }
        .btn-reject:hover { background-color: #c82333; }
    </style>
</head>
<body>

    <h1 style="text-align:center;">Telebirr Payment Validation Simulator</h1>
    
    <div class="container">
        <!-- Section 1: User Simulation Form -->
        <div class="card">
            <h2>1. User Deposit Form</h2>
            <form id="depositForm">
                <div class="form-group">
                    <label>User ID / Username</label>
                    <input type="text" id="userId" placeholder="e.g., Player77" required>
                </div>
                <div class="form-group">
                    <label>Amount (ETB)</label>
                    <input type="number" id="amount" placeholder="e.g., 500" required>
                </div>
                <div class="form-group">
                    <label>Telebirr Transaction ID</label>
                    <input type="text" id="transactionId" placeholder="e.g., CRA1B2C3D4" required>
                </div>
                <div class="form-group">
                    <label>Upload Payment Screenshot</label>
                    <input type="file" id="screenshot" accept="image/*" required>
                </div>
                <button type="submit">Submit Deposit</button>
            </form>
        </div>

        <!-- Section 2: Admin Dashboard Panel -->
        <div class="card">
            <h2>2. Admin Verification Portal</h2>
            <div id="adminQueue">
                <p style="color: #666;">No pending transactions to review.</p>
            </div>
        </div>
    </div>

    <script>
        // Handle User Form Submission
        document.getElementById('depositForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData();
            formData.append('userId', document.getElementById('userId').value);
            formData.append('amount', document.getElementById('amount').value);
            formData.append('transactionId', document.getElementById('transactionId').value);
            formData.append('screenshot', document.getElementById('screenshot').files[0]);

            try {
                const response = await fetch('/api/deposit/submit', { method: 'POST', body: formData });
                const result = await response.json();
                
                if (response.ok) {
                    alert(result.message);
                    document.getElementById('depositForm').reset();
                    loadAdminQueue();
                } else {
                    alert('Error: ' + result.error);
                }
            } catch (err) {
                console.error(err);
                alert('Server connection failed.');
            }
        });

        // Load Pending Dashboard Transactions for Admin
        async function loadAdminQueue() {
            const queueContainer = document.getElementById('adminQueue');
            
            try {
                const response = await fetch('/api/admin/pending');
                const list = await response.json();
                
                if (list.length === 0) {
                    queueContainer.innerHTML = '<p style="color: #666;">No pending transactions to review.</p>';
                    return;
                }

                queueContainer.innerHTML = '';
                list.forEach(tx => {
                    queueContainer.innerHTML += `
                        <div class="tx-card">
                            <div class="tx-details">
                                <strong>User:</strong> ${tx.userId} | 
                                <strong>Amount:</strong> <span style="color:green; font-weight:bold;">${tx.amount} ETB</span><br>
                                <strong>Transaction ID:</strong> <span style="font-family:monospace; font-size:16px; background:#f0f0f0; padding:2px 4px;">${tx.transactionId}</span><br>
                                <small style="color:#777;">Submitted at: ${tx.timestamp}</small>
                            </div>
                            <div>
                                <label>Submitted Telebirr Receipt Screenshot:</label>
                                <img src="${tx.screenshotUrl}" class="screenshot-preview" alt="Receipt">
                            </div>
                            <div class="btn-group">
                                <button class="btn-approve" onclick="verifyTx('${tx.transactionId}', 'Approve')">Approve & Credit Balance</button>
                                <button class="btn-reject" onclick="verifyTx('${tx.transactionId}', 'Reject')">Reject / Fraud</button>
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                queueContainer.innerHTML = '<p style="color:red;">Error loading admin queue.</p>';
            }
        }

        // Action Executed by Admin
        async function verifyTx(transactionId, action) {
            try {
                const response = await fetch('/api/admin/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ transactionId, action })
                });
                const result = await response.json();
                alert(result.message || result.error);
                loadAdminQueue();
            } catch (err) {
                alert('Action failed.');
            }
        }

        // Initial Load
        loadAdminQueue();
    </script>
</body>
</html>
